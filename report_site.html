document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n      --blue-900: #3a1810;\n\n      /* sage secondary */\n      --sage-100: #e6ebe2;\n      --sage-300: #a8b59a;\n      --sage-500: #6e7d62;\n      --sage-700: #4a5740;\n\n      --accent: var(--blue-600);\n      --accent-soft: var(--blue-50);\n\n      --shadow-sm: 0 1px 2px rgba(40, 30, 20, 0.04), 0 1px 3px rgba(40, 30, 20, 0.06);\n      --shadow-md: 0 4px 12px rgba(40, 30, 20, 0.06), 0 1px 4px rgba(40, 30, 20, 0.04);\n      --shadow-lg: 0 24px 60px rgba(40, 30, 20, 0.08), 0 4px 12px rgba(40, 30, 20, 0.04);\n\n      --mono: \"Geist Mono\", \"SFMono-Regular\", \"Menlo\", monospace;\n      --sans: \"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", system-ui, sans-serif;\n      --serif: \"Instrument Serif\", \"Iowan Old Style\", \"Apple Garamond\", Georgia, serif;\n\n      --radius-sm: 8px;\n      --radius-md: 14px;\n      --radius-lg: 20px;\n      --radius-xl: 28px;\n    }\n\n    * { box-sizing: border-box; }\n    html { scroll-behavior: smooth; }\n    body {\n      margin: 0;\n      color: var(--ink);\n      background: var(--bg);\n      background-image:\n        radial-gradient(circle at 0% 0%, rgba(194, 91, 53, 0.08) 0%, transparent 35%),\n        radial-gradient(circle at 100% 0%, rgba(110, 125, 98, 0.06) 0%, transparent 30%);\n      background-attachment: fixed;\n      font-family: var(--sans);\n      line-height: 1.55;\n      font-feature-settings: \"ss01\", \"cv11\";\n      -webkit-font-smoothing: antialiased;\n      letter-spacing: -0.005em;\n    }\n\n    a { color: var(--blue-600); }\n    code, pre, .mono {\n      font-family: var(--mono);\n      font-size: 0.88em;\n      background: var(--blue-50);\n      color: var(--blue-800);\n      padding: 1px 6px;\n      border-radius: 5px;\n      letter-spacing: -0.01em;\n    }\n    .equation code, .equation { background: transparent; padding: 0; }\n\n    .shell {\n      max-width: 1240px;\n      margin: 0 auto;\n      padding: 32px 24px 80px;\n    }\n\n    /* ---------- Hero ---------- */\n    .hero {\n      background: var(--paper);\n      border: 1px solid var(--line);\n      box-shadow: var(--shadow-lg);\n      border-radius: var(--radius-xl);\n      overflow: hidden;\n      position: relative;\n    }\n    .hero::before {\n      content: \"\";\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 4px;\n      background: linear-gradient(90deg, var(--blue-700), var(--blue-400), var(--blue-700));\n    }\n    .hero-inner {\n      position: relative;\n      padding: 48px 48px 40px;\n      display: grid;\n      grid-template-columns: 1.3fr 0.9fr;\n      gap: 40px;\n      align-items: start;\n    }\n\n    h1, h2, h3 {\n      line-height: 1.08;\n      margin: 0 0 14px;\n      font-weight: 700;\n      letter-spacing: -0.025em;\n      color: var(--ink);\n    }\n    h1 {\n      font-family: var(--serif);\n      font-size: clamp(2.8rem, 5.2vw, 4.6rem);\n      letter-spacing: -0.02em;\n      max-width: 14ch;\n      font-weight: 400;\n      line-height: 1.0;\n    }\n    h1 em { font-style: italic; color: var(--blue-600); }\n    h2 {\n      font-size: clamp(1.5rem, 2vw, 2rem);\n      letter-spacing: -0.03em;\n      margin-bottom: 8px;\n    }\n    h3 {\n      font-size: 0.78rem;\n      text-transform: uppercase;\n      letter-spacing: 0.12em;\n      color: var(--blue-600);\n      font-weight: 600;\n    }\n\n    .kicker {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      margin-bottom: 18px;\n      padding: 6px 12px;\n      border-radius: 999px;\n      border: 1px solid var(--blue-200);\n      background: var(--blue-50);\n      color: var(--blue-700);\n      font-size: 0.78rem;\n      font-weight: 500;\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n    }\n    .kicker::before {\n      content: \"\";\n      width: 6px; height: 6px;\n      border-radius: 50%;\n      background: var(--blue-500);\n      box-shadow: 0 0 0 3px rgba(47, 107, 234, 0.2);\n    }\n\n    .lede {\n      max-width: 60ch;\n      font-size: 1.08rem;\n      color: var(--muted);\n      margin-top: 8px;\n    }\n\n    .chips {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 8px;\n      margin-top: 22px;\n    }\n    .chip {\n      padding: 6px 12px;\n      border-radius: 999px;\n      font-size: 0.84rem;\n      border: 1px solid var(--line);\n      background: var(--paper);\n      color: var(--ink-2);\n      font-family: var(--mono);\n      font-weight: 500;\n    }\n\n    .hero-metrics {\n      display: grid;\n      grid-template-columns: repeat(2, 1fr);\n      gap: 10px;\n      align-content: start;\n    }\n    .metric-card {\n      padding: 18px 16px;\n      background: var(--paper);\n      border: 1px solid var(--line);\n      border-radius: var(--radius-md);\n      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;\n    }\n    .metric-card:hover {\n      transform: translateY(-2px);\n      border-color: var(--blue-300);\n      box-shadow: var(--shadow-md);\n    }\n    .metric-card .value {\n      display: block;\n      font-size: 1.6rem;\n      letter-spacing: -0.04em;\n      font-weight: 700;\n      color: var(--ink);\n      font-variant-numeric: tabular-nums;\n    }\n    .metric-card .label {\n      color: var(--muted);\n      font-size: 0.84rem;\n      margin-top: 4px;\n    }\n    .metric-card.highlight {\n      background: linear-gradient(180deg, #2e2e2e, #1a1a1a);\n      border-color: #1a1a1a;\n    }\n    .metric-card.highlight .value { color: #fff; }\n    .metric-card.highlight .label { color: var(--blue-200); }\n\n    /* ---------- Nav ---------- */\n    .nav {\n      position: sticky;\n      top: 12px;\n      z-index: 20;\n      margin: 22px 0 28px;\n      backdrop-filter: blur(14px) saturate(1.4);\n      -webkit-backdrop-filter: blur(14px) saturate(1.4);\n      background: rgba(255, 255, 255, 0.82);\n      border: 1px solid var(--line);\n      border-radius: 999px;\n      box-shadow: var(--shadow-md);\n      padding: 6px;\n    }\n    .nav ul {\n      list-style: none;\n      padding: 0;\n      margin: 0;\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px;\n    }\n    .nav a {\n      display: inline-block;\n      padding: 8px 14px;\n      border-radius: 999px;\n      text-decoration: none;\n      color: var(--ink-2);\n      font-size: 0.88rem;\n      font-weight: 500;\n      transition: background .15s ease, color .15s ease;\n    }\n    .nav a:hover {\n      background: var(--blue-50);\n      color: var(--blue-700);\n    }\n\n    /* ---------- Sections ---------- */\n    .section {\n      margin-top: 20px;\n      padding: 36px 40px;\n      background: var(--paper);\n      border: 1px solid var(--line);\n      border-radius: var(--radius-xl);\n      box-shadow: var(--shadow-sm);\n    }\n    .section-grid {\n      display: grid;\n      grid-template-columns: 1.05fr 0.95fr;\n      gap: 32px;\n      align-items: start;\n    }\n    .section p { margin: 0 0 14px; color: var(--ink-2); }\n    .section p:last-child { margin-bottom: 0; }\n\n    /* ---------- Callouts ---------- */\n    .callout, .mini-panel {\n      border-radius: var(--radius-lg);\n      padding: 20px 22px;\n      border: 1px solid var(--line);\n      background: var(--paper);\n    }\n    .callout {\n      background: var(--blue-50);\n      border-color: var(--blue-100);\n    }\n    .callout h3 { color: var(--blue-700); margin-bottom: 10px; }\n    .callout p { color: var(--ink-2); }\n\n    .callout.dark {\n      background: linear-gradient(180deg, #2e2e2e, #1a1a1a);\n      border-color: #1a1a1a;\n      color: #fff;\n    }\n    .callout.dark h3 { color: var(--blue-200); }\n    .callout.dark p, .callout.dark li { color: rgba(255,255,255,0.85); }\n    .callout.dark code { background: rgba(255,255,255,0.12); color: #fff; }\n\n    .callout.outline {\n      background: var(--paper);\n      border: 1px solid var(--line);\n    }\n    .callout.outline h3 { color: var(--blue-700); }\n\n    .mini-panel {\n      background: var(--paper);\n      border: 1px dashed var(--line-2);\n      font-size: 0.94rem;\n      color: var(--ink-2);\n    }\n    .mini-panel strong { color: var(--ink); }\n\n    .equation {\n      display: inline-block;\n      margin: 6px 0;\n      padding: 10px 16px;\n      background: var(--ink);\n      color: #d6e4ff;\n      border-radius: 10px;\n      font-family: var(--mono);\n      font-size: 0.92rem;\n      letter-spacing: -0.01em;\n    }\n    .equation .op { color: var(--blue-300); }\n    .equation .var { color: #fff; font-weight: 600; }\n\n    /* ---------- Tables ---------- */\n    .table-wrap {\n      overflow-x: auto;\n      border: 1px solid var(--line);\n      border-radius: var(--radius-md);\n      margin-top: 14px;\n    }\n    table {\n      width: 100%;\n      border-collapse: collapse;\n      font-size: 0.92rem;\n    }\n    th, td {\n      padding: 12px 14px;\n      border-bottom: 1px solid var(--line);\n      text-align: left;\n      vertical-align: middle;\n    }\n    tbody tr:last-child td { border-bottom: none; }\n    tbody tr:hover { background: var(--blue-50); }\n    thead th {\n      font-size: 0.74rem;\n      text-transform: uppercase;\n      letter-spacing: 0.08em;\n      color: var(--muted);\n      background: #f4f1ec;\n      font-weight: 600;\n      border-bottom: 1px solid var(--line);\n    }\n    .benchmark-table th:not(:first-child),\n    .benchmark-table td:not(:first-child),\n    .numeric {\n      text-align: right;\n      font-variant-numeric: tabular-nums;\n      font-family: var(--mono);\n    }\n    .row-highlight td {\n      background: var(--blue-50);\n      font-weight: 600;\n      color: var(--blue-800);\n    }\n    .row-highlight td code { background: var(--blue-100); }\n\n    /* ---------- SVG diagrams ---------- */\n    .svg-wrap {\n      padding: 8px;\n      background: linear-gradient(180deg, #f4f1ec, #f1f6fc);\n      border-radius: var(--radius-lg);\n      border: 1px solid var(--line);\n    }\n    svg {\n      width: 100%;\n      height: auto;\n      display: block;\n      font-family: var(--sans);\n    }\n    svg text { fill: var(--ink); }\n    svg .mono { font-family: var(--mono); }\n    svg .label { font-size: 13px; fill: var(--muted); }\n    svg .title { font-size: 16px; font-weight: 600; fill: var(--ink); letter-spacing: -0.01em; }\n\n    /* ---------- Legend ---------- */\n    .legend {\n      display: grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      gap: 12px;\n      margin-top: 16px;\n    }\n    .legend-item {\n      display: flex;\n      gap: 10px;\n      align-items: flex-start;\n      font-size: 0.92rem;\n      color: var(--ink-2);\n    }\n    .swatch {\n      width: 14px;\n      height: 14px;\n      border-radius: 4px;\n      margin-top: 4px;\n      flex: 0 0 auto;\n    }\n\n    .two-col-list {\n      columns: 2;\n      column-gap: 28px;\n      margin: 14px 0 0;\n      padding-left: 18px;\n      color: var(--ink-2);\n    }\n    .two-col-list li {\n      margin-bottom: 8px;\n      break-inside: avoid;\n    }\n\n    .footer-note {\n      color: var(--muted);\n      font-size: 0.92rem;\n    }\n\n    .section-head {\n      margin-bottom: 22px;\n    }\n    .section-head .num {\n      display: inline-block;\n      font-family: var(--mono);\n      font-size: 0.78rem;\n      color: var(--blue-600);\n      background: var(--blue-50);\n      padding: 3px 8px;\n      border-radius: 6px;\n      margin-bottom: 10px;\n      font-weight: 500;\n    }\n\n    @media (max-width: 980px) {\n      .hero-inner,\n      .section-grid,\n      .legend {\n        grid-template-columns: 1fr;\n      }\n      .two-col-list { columns: 1; }\n      .section { padding: 28px 24px; }\n      .hero-inner { padding: 32px 28px; }\n    }\n    @media (max-width: 680px) {\n      .shell { padding: 18px 14px 40px; }\n      .hero-inner { padding: 26px 20px; }\n      .hero-metrics { grid-template-columns: 1fr 1fr; }\n      .nav { border-radius: var(--radius-lg); }\n      .nav ul { gap: 4px; }\n      .nav a { padding: 6px 10px; font-size: 0.84rem; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"shell\">\n\n    <!-- HERO -->\n    <header class=\"hero\" id=\"top\">\n      <div class=\"hero-inner\">\n        <div>\n          <div class=\"kicker\">Technical Explainer<\u002Fdiv>\n          <h1>Prefix Cache Eviction Gap<\u002Fh1>\n          <p class=\"lede\">\n            How the trace is built, how the radix cache is modeled, why the offline\n            oracle is defined the way it is, how the shadow-oracle mechanism analysis\n            works, and what motivated the <code>depth_lru<\u002Fcode> heuristic.\n          <\u002Fp>\n          <div class=\"chips\">\n            <span class=\"chip\">ShareGPT snapshot<\u002Fspan>\n            <span class=\"chip\">Llama-3 alt tokenizer<\u002Fspan>\n            <span class=\"chip\">fixed-block radix<\u002Fspan>\n            <span class=\"chip\">300 conversations<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hero-metrics\">\n          <div class=\"metric-card\">\n            <span class=\"value\">300<\u002Fspan>\n            <span class=\"label\">conversations<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-card\">\n            <span class=\"value\">978<\u002Fspan>\n            <span class=\"label\">accesses<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-card\">\n            <span class=\"value\">811,050<\u002Fspan>\n            <span class=\"label\">requested tokens<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-card\">\n            <span class=\"value\">319,862<\u002Fspan>\n            <span class=\"label\">unique prefixes<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-card highlight\">\n            <span class=\"value\">80.2%<\u002Fspan>\n            <span class=\"label\">LRU peak gap<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-card highlight\">\n            <span class=\"value\">79.3%<\u002Fspan>\n            <span class=\"label\">DepthLRU peak gap<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- NAV -->\n    <nav class=\"nav\" aria-label=\"Section navigation\">\n      <ul>\n        <li><a href=\"#abstract\">Abstract<\u002Fa><\u002Fli>\n        <li><a href=\"#trace-construction\">Trace<\u002Fa><\u002Fli>\n        <li><a href=\"#cache-model\">Cache Model<\u002Fa><\u002Fli>\n        <li><a href=\"#policies\">Policies<\u002Fa><\u002Fli>\n        <li><a href=\"#offline-oracle\">Oracle<\u002Fa><\u002Fli>\n        <li><a href=\"#mechanism-analysis\">Mechanism<\u002Fa><\u002Fli>\n        <li><a href=\"#heuristic-motivation\">DepthLRU<\u002Fa><\u002Fli>\n        <li><a href=\"#results\">Results<\u002Fa><\u002Fli>\n        <li><a href=\"#fidelity\">Fidelity<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fnav>\n\n    <!-- ABSTRACT -->\n    <section class=\"section\" id=\"abstract\">\n      <div class=\"section-head\">\n        <span class=\"num\">01 / Abstract<\u002Fspan>\n        <h2>The narrow question<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            The core question is narrower than generic Belady framing: on a\n            ShareGPT-style chat trace, how large is the gap between common online\n            prefix-cache eviction policies and an upper bound under the same\n            leaf-only candidate constraint?\n          <\u002Fp>\n          <p>\n            The current repository answers that question under a deliberately clean\n            model. Each cached radix node stores exactly one fixed-size block. The\n            reported benchmark uses <code>page_size = 1<\u002Fcode>, so one block equals\n            one token for accounting. In plain terms, this is a diagnostic baseline,\n            not a production-faithful page configuration, but it preserves the\n            explicit block-eviction semantics needed for a well-defined oracle.\n          <\u002Fp>\n          <p>\n            The key result is large: <code>lru<\u002Fcode> reaches a peak relative gap of\n            <strong>80.2%<\u002Fstrong> versus <code>tc_belady<\u002Fcode> at\n            <strong>1271 blocks<\u002Fstrong>. The main failure mode is not random noise.\n            It is a systematic tendency to keep freshly touched deep tail blocks that\n            are already dead, which motivated the <code>depth_lru<\u002Fcode> heuristic.\n          <\u002Fp>\n        <\u002Fdiv>\n        <aside class=\"callout dark\">\n          <h3>Research scope<\u002Fh3>\n          <p>\n            Not a full production simulator of all SGLang features. A report-oriented\n            eviction study under a fixed-block, page-aligned radix model with a\n            tree-constrained offline oracle and a shadow-oracle mechanism analysis.\n          <\u002Fp>\n          <p>\n            The safe reading: this measures an upper bound under the same leaf-only\n            candidate constraint, not an unconstrained global optimum.\n          <\u002Fp>\n          <div class=\"equation\"><span class=\"var\">relative_gap<\u002Fspan> <span class=\"op\">=<\u002Fspan> (tc_belady <span class=\"op\">−<\u002Fspan> baseline) <span class=\"op\">/<\u002Fspan> tc_belady<\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TRACE -->\n    <section class=\"section\" id=\"trace-construction\">\n      <div class=\"section-head\">\n        <span class=\"num\">02 / Trace<\u002Fspan>\n        <h2>Trace construction<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            The input data is a cached local snapshot of\n            <code>ShareGPT_Vicuna_unfiltered<\u002Fcode>. Each conversation is processed\n            in order. Every human turn becomes one access, and the accessed object\n            is the entire accumulated prompt prefix up to that turn.\n          <\u002Fp>\n          <p>\n            This matters because the cache is not serving isolated utterances. It is\n            serving prefixes that grow over time. A later request can hit a long\n            shared prefix even when the final tail diverges.\n          <\u002Fp>\n          <p>\n            Across conversations, accesses are globally interleaved rather than\n            concatenated sequentially. The resulting benchmark trace contains\n            <strong>300 conversations<\u002Fstrong> and <strong>978 accesses<\u002Fstrong>.\n          <\u002Fp>\n          <div class=\"mini-panel\" style=\"margin-top:14px;\">\n            <strong>Tokenizer.<\u002Fstrong>\n            The benchmark uses <code>Meta-Llama-3-8B-Alternate-Tokenizer<\u002Fcode>.\n            The serialized trace remains token-level; blocking is applied later\n            inside the simulator.\n          <\u002Fdiv>\n          <div class=\"mini-panel\" style=\"margin-top:10px;\">\n            <strong>Arrival model.<\u002Fstrong>\n            Interleaving order is random with seed 0 — a modeling choice, not a\n            measured production arrival schedule.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"svg-wrap\">\n          <svg viewBox=\"0 0 720 380\" role=\"img\" aria-label=\"Conversation interleaving diagram\">\n            <defs>\n              <marker id=\"arr1\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n                <path d=\"M0 0 L10 5 L0 10 z\" fill=\"#a8462a\"><\u002Fpath>\n              <\u002Fmarker>\n              <marker id=\"arr2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n                <path d=\"M0 0 L10 5 L0 10 z\" fill=\"#6e7d62\"><\u002Fpath>\n              <\u002Fmarker>\n            <\u002Fdefs>\n            <rect x=\"0\" y=\"0\" width=\"720\" height=\"380\" rx=\"14\" fill=\"#ffffff\"><\u002Frect>\n            <text x=\"24\" y=\"32\" class=\"title\">Human turns → prefix accesses → interleaved trace<\u002Ftext>\n\n            <!-- Conv A -->\n            <rect x=\"20\" y=\"60\" width=\"240\" height=\"130\" rx=\"12\" fill=\"#ffffff\" stroke=\"#a8462a\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"34\" y=\"84\" font-size=\"13\" font-weight=\"600\" fill=\"#a8462a\">Conversation A<\u002Ftext>\n            <text x=\"34\" y=\"108\" font-size=\"12\" fill=\"#2e2e2e\">A1 · \"How does eviction work?\"<\u002Ftext>\n            <text x=\"34\" y=\"130\" font-size=\"12\" fill=\"#9a958f\">A2 · assistant reply<\u002Ftext>\n            <text x=\"34\" y=\"152\" font-size=\"12\" fill=\"#2e2e2e\">A3 · \"What about Belady?\"<\u002Ftext>\n            <text x=\"34\" y=\"174\" font-size=\"12\" fill=\"#9a958f\">A4 · assistant reply<\u002Ftext>\n\n            <!-- Conv B -->\n            <rect x=\"20\" y=\"210\" width=\"240\" height=\"130\" rx=\"12\" fill=\"#ffffff\" stroke=\"#6e7d62\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"34\" y=\"234\" font-size=\"13\" font-weight=\"600\" fill=\"#6e7d62\">Conversation B<\u002Ftext>\n            <text x=\"34\" y=\"258\" font-size=\"12\" fill=\"#2e2e2e\">B1 · \"LRU failure modes\"<\u002Ftext>\n            <text x=\"34\" y=\"280\" font-size=\"12\" fill=\"#9a958f\">B2 · assistant reply<\u002Ftext>\n            <text x=\"34\" y=\"302\" font-size=\"12\" fill=\"#2e2e2e\">B3 · \"Can depth help?\"<\u002Ftext>\n\n            <!-- Arrows -->\n            <path d=\"M260 110 C 340 110, 360 110, 440 110\" fill=\"none\" stroke=\"#a8462a\" stroke-width=\"2\" marker-end=\"url(#arr1)\"><\u002Fpath>\n            <path d=\"M260 154 C 340 154, 360 152, 440 152\" fill=\"none\" stroke=\"#a8462a\" stroke-width=\"2\" marker-end=\"url(#arr1)\" stroke-dasharray=\"4 4\"><\u002Fpath>\n            <path d=\"M260 260 C 340 260, 360 196, 440 196\" fill=\"none\" stroke=\"#6e7d62\" stroke-width=\"2\" marker-end=\"url(#arr2)\"><\u002Fpath>\n            <path d=\"M260 304 C 340 304, 360 240, 440 240\" fill=\"none\" stroke=\"#6e7d62\" stroke-width=\"2\" marker-end=\"url(#arr2)\" stroke-dasharray=\"4 4\"><\u002Fpath>\n\n            <!-- Trace -->\n            <rect x=\"450\" y=\"60\" width=\"250\" height=\"280\" rx=\"12\" fill=\"#f4f1ec\" stroke=\"#d4cec3\"><\u002Frect>\n            <text x=\"464\" y=\"84\" font-size=\"13\" font-weight=\"600\" fill=\"#1a1a1a\">Global interleaved trace<\u002Ftext>\n\n            <rect x=\"464\" y=\"96\" width=\"222\" height=\"30\" rx=\"8\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"1\"><\u002Frect>\n            <text x=\"476\" y=\"115\" font-size=\"12\" font-weight=\"500\" fill=\"#853720\">access 0 · A1 prefix<\u002Ftext>\n\n            <rect x=\"464\" y=\"134\" width=\"222\" height=\"30\" rx=\"8\" fill=\"#fbf0ea\" stroke=\"#6e7d62\" stroke-width=\"1\"><\u002Frect>\n            <text x=\"476\" y=\"153\" font-size=\"12\" font-weight=\"500\" fill=\"#a8462a\">access 1 · B1 prefix<\u002Ftext>\n\n            <rect x=\"464\" y=\"172\" width=\"222\" height=\"30\" rx=\"8\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"1\"><\u002Frect>\n            <text x=\"476\" y=\"191\" font-size=\"12\" font-weight=\"500\" fill=\"#853720\">access 2 · A3 prefix<\u002Ftext>\n\n            <rect x=\"464\" y=\"210\" width=\"222\" height=\"30\" rx=\"8\" fill=\"#fbf0ea\" stroke=\"#6e7d62\" stroke-width=\"1\"><\u002Frect>\n            <text x=\"476\" y=\"229\" font-size=\"12\" font-weight=\"500\" fill=\"#a8462a\">access 3 · B3 prefix<\u002Ftext>\n\n            <text x=\"464\" y=\"262\" font-size=\"11\" fill=\"#9a958f\">… 974 more accesses, seeded random order …<\u002Ftext>\n\n            <rect x=\"464\" y=\"280\" width=\"222\" height=\"44\" rx=\"8\" fill=\"#a8462a\"><\u002Frect>\n            <text x=\"476\" y=\"299\" font-size=\"11\" fill=\"#fbfaf7\" font-weight=\"500\">TOTAL<\u002Ftext>\n            <text x=\"476\" y=\"316\" font-size=\"13\" fill=\"#ffffff\" font-weight=\"600\">978 accesses · 300 conversations<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CACHE MODEL -->\n    <section class=\"section\" id=\"cache-model\">\n      <div class=\"section-head\">\n        <span class=\"num\">03 / Model<\u002Fspan>\n        <h2>Fixed-block cache model<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            The simulator uses a fixed-size block radix tree. Each node stores\n            exactly one block. Prefix matching only counts on full block boundaries.\n            A trailing partial block is still a block and still consumes one unit of\n            cache capacity.\n          <\u002Fp>\n          <p>\n            In the current benchmark, <code>page_size = 1<\u002Fcode>. That removes\n            internal fragmentation from the reported run while keeping the explicit\n            block semantics that make the offline oracle tractable.\n          <\u002Fp>\n          <div class=\"callout\">\n            <h3>Accounting rule<\u002Fh3>\n            <p>\n              Benefit is measured in reused tokens and reused full requests. Cost is\n              measured in blocks. Under the current run, the full-cache point is\n              <strong>319,862 blocks<\u002Fstrong>, which matches the number of unique\n              block prefixes in the trace.\n            <\u002Fp>\n          <\u002Fdiv>\n          <ul class=\"two-col-list\">\n            <li>one radix node per block<\u002Fli>\n            <li>block budget, not token budget<\u002Fli>\n            <li>leaf-only online eviction<\u002Fli>\n            <li>full-block prefix hits only<\u002Fli>\n            <li>same tree for online and offline<\u002Fli>\n            <li>explicit candidate leaf set<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"svg-wrap\">\n          <svg viewBox=\"0 0 720 420\" role=\"img\" aria-label=\"Token to block to radix tree diagram\">\n            <rect x=\"0\" y=\"0\" width=\"720\" height=\"420\" rx=\"14\" fill=\"#ffffff\"><\u002Frect>\n            <text x=\"24\" y=\"32\" class=\"title\">Token stream → blocks → radix path<\u002Ftext>\n\n            <!-- Step 1: tokens -->\n            <text x=\"24\" y=\"64\" class=\"label\">1. Request tokens<\u002Ftext>\n            <g font-family=\"Geist Mono, monospace\" font-size=\"13\">\n              <rect x=\"24\" y=\"76\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n              <text x=\"40\" y=\"100\" fill=\"#853720\">t1<\u002Ftext>\n              <rect x=\"74\" y=\"76\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n              <text x=\"90\" y=\"100\" fill=\"#853720\">t2<\u002Ftext>\n              <rect x=\"124\" y=\"76\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n              <text x=\"140\" y=\"100\" fill=\"#853720\">t3<\u002Ftext>\n              <rect x=\"174\" y=\"76\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n              <text x=\"190\" y=\"100\" fill=\"#853720\">t4<\u002Ftext>\n              <rect x=\"224\" y=\"76\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n              <text x=\"240\" y=\"100\" fill=\"#853720\">t5<\u002Ftext>\n            <\u002Fg>\n\n            <!-- Step 2: blocks -->\n            <text x=\"24\" y=\"156\" class=\"label\">2. Chunk at page_size = 1 → one block per token<\u002Ftext>\n            <g font-family=\"Geist Mono, monospace\" font-size=\"12\">\n              <rect x=\"24\" y=\"168\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#a8462a\"><\u002Frect>\n              <text x=\"35\" y=\"192\" fill=\"#ffffff\">b1<\u002Ftext>\n              <rect x=\"74\" y=\"168\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#a8462a\"><\u002Frect>\n              <text x=\"85\" y=\"192\" fill=\"#ffffff\">b2<\u002Ftext>\n              <rect x=\"124\" y=\"168\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#a8462a\"><\u002Frect>\n              <text x=\"135\" y=\"192\" fill=\"#ffffff\">b3<\u002Ftext>\n              <rect x=\"174\" y=\"168\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#a8462a\"><\u002Frect>\n              <text x=\"185\" y=\"192\" fill=\"#ffffff\">b4<\u002Ftext>\n              <rect x=\"224\" y=\"168\" width=\"44\" height=\"36\" rx=\"6\" fill=\"#a8462a\"><\u002Frect>\n              <text x=\"235\" y=\"192\" fill=\"#ffffff\">b5<\u002Ftext>\n            <\u002Fg>\n\n            <!-- Step 3 label -->\n            <text x=\"24\" y=\"248\" class=\"label\">3. Insert as radix nodes (one per block)<\u002Ftext>\n\n            <!-- arrow from rightmost block down and around to tree (clear of step-3 text) -->\n            <path d=\"M268 186 C 320 186, 360 186, 400 186 L 400 84\" fill=\"none\" stroke=\"#6b6660\" stroke-width=\"1.5\" stroke-dasharray=\"3 3\" marker-end=\"url(#arr1)\"><\u002Fpath>\n\n            <!-- Tree -->\n            <g>\n              <line x1=\"430\" y1=\"90\" x2=\"500\" y2=\"130\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"500\" y1=\"146\" x2=\"540\" y2=\"186\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"540\" y1=\"202\" x2=\"580\" y2=\"242\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"580\" y1=\"258\" x2=\"620\" y2=\"298\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"620\" y1=\"314\" x2=\"660\" y2=\"354\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n\n              <circle cx=\"430\" cy=\"84\" r=\"20\" fill=\"#ffffff\" stroke=\"#1a1a1a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"430\" y=\"89\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"600\">R<\u002Ftext>\n\n              <circle cx=\"500\" cy=\"138\" r=\"20\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"500\" y=\"143\" text-anchor=\"middle\" font-size=\"12\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">b1<\u002Ftext>\n\n              <circle cx=\"540\" cy=\"194\" r=\"20\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"540\" y=\"199\" text-anchor=\"middle\" font-size=\"12\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">b2<\u002Ftext>\n\n              <circle cx=\"580\" cy=\"250\" r=\"20\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"580\" y=\"255\" text-anchor=\"middle\" font-size=\"12\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">b3<\u002Ftext>\n\n              <circle cx=\"620\" cy=\"306\" r=\"20\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"620\" y=\"311\" text-anchor=\"middle\" font-size=\"12\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">b4<\u002Ftext>\n\n              <circle cx=\"660\" cy=\"362\" r=\"20\" fill=\"#a8462a\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"660\" y=\"367\" text-anchor=\"middle\" font-size=\"12\" font-family=\"Geist Mono, monospace\" fill=\"#ffffff\">b5<\u002Ftext>\n\n              <text x=\"688\" y=\"367\" font-size=\"11\" fill=\"#9a958f\">leaf<\u002Ftext>\n            <\u002Fg>\n\n            <!-- Annotations -->\n            <text x=\"24\" y=\"290\" font-size=\"12\" fill=\"#6b6660\">Each node holds exactly one<\u002Ftext>\n            <text x=\"24\" y=\"308\" font-size=\"12\" fill=\"#6b6660\">fixed-size block.<\u002Ftext>\n            <text x=\"24\" y=\"338\" font-size=\"12\" fill=\"#6b6660\">Eviction occurs at leaf<\u002Ftext>\n            <text x=\"24\" y=\"356\" font-size=\"12\" fill=\"#6b6660\">blocks only.<\u002Ftext>\n\n            <text x=\"24\" y=\"394\" font-size=\"12\" font-family=\"Geist Mono, monospace\" fill=\"#a8462a\">page_size = 1<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- POLICIES -->\n    <section class=\"section\" id=\"policies\">\n      <div class=\"section-head\">\n        <span class=\"num\">04 / Policies<\u002Fspan>\n        <h2>Eviction policies under comparison<\u002Fh2>\n      <\u002Fdiv>\n      <p>\n        The simulator supports standard online policies, one heuristic, and one\n        offline upper bound. All online policies operate on the same block radix\n        tree and choose from the same current leaf set.\n      <\u002Fp>\n      <div class=\"table-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>Policy<\u002Fth>\n              <th>Priority key<\u002Fth>\n              <th>Interpretation<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td><code>lru<\u002Fcode><\u002Ftd><td><code>last_access_index<\u002Fcode><\u002Ftd><td>Evict oldest-by-recency leaf block.<\u002Ftd><\u002Ftr>\n            <tr><td><code>lfu<\u002Fcode><\u002Ftd><td><code>(access_count, last_access_index)<\u002Fcode><\u002Ftd><td>Low-frequency leaves first, then old ones.<\u002Ftd><\u002Ftr>\n            <tr><td><code>fifo<\u002Fcode><\u002Ftd><td><code>created_at<\u002Fcode><\u002Ftd><td>Evict oldest inserted leaf block.<\u002Ftd><\u002Ftr>\n            <tr><td><code>mru<\u002Fcode><\u002Ftd><td><code>-last_access_index<\u002Fcode><\u002Ftd><td>Most recent leaves first.<\u002Ftd><\u002Ftr>\n            <tr><td><code>filo<\u002Fcode><\u002Ftd><td><code>-created_at<\u002Fcode><\u002Ftd><td>Newest inserted leaves first.<\u002Ftd><\u002Ftr>\n            <tr><td><code>slru<\u002Fcode><\u002Ftd><td><code>(segment, last_access_index)<\u002Fcode><\u002Ftd><td>Two-segment recency split via access-count threshold.<\u002Ftd><\u002Ftr>\n            <tr><td><code>priority<\u002Fcode><\u002Ftd><td><code>(node.priority, last_access_index)<\u002Fcode><\u002Ftd><td>Matches SGLang's priority-aware rule.<\u002Ftd><\u002Ftr>\n            <tr><td><code>random<\u002Fcode><\u002Ftd><td><code>uniform random<\u002Fcode><\u002Ftd><td>Lower-bound sanity baseline.<\u002Ftd><\u002Ftr>\n            <tr class=\"row-highlight\"><td><code>depth_lru<\u002Fcode><\u002Ftd><td><code>last_access_index − α · depth<\u002Fcode><\u002Ftd><td>Recency with depth penalty against false warmth.<\u002Ftd><\u002Ftr>\n            <tr class=\"row-highlight\"><td><code>tc_belady<\u002Fcode><\u002Ftd><td><code>future next-use distance<\u002Fcode><\u002Ftd><td>Tree-constrained offline oracle (upper bound).<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"callout\" style=\"margin-top:18px;\">\n        <h3>Priority policy note<\u002Fh3>\n        <p>\n          In SGLang, request metadata can carry a priority value that is propagated\n          into the radix cache. The local simulator implements the same rule, but\n          the current ShareGPT trace carries no request-priority metadata. Every\n          node receives priority <code>0<\u002Fcode>, so priority reduces to plain\n          <code>lru<\u002Fcode> in this benchmark.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ORACLE -->\n    <section class=\"section\" id=\"offline-oracle\">\n      <div class=\"section-head\">\n        <span class=\"num\">05 / Oracle<\u002Fspan>\n        <h2>Tree-constrained offline oracle<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            The offline comparator remains named <code>tc_belady<\u002Fcode>, but under\n            the current design it is the offline optimum for the simplified\n            fixed-block model, not for unconstrained token caching in the abstract.\n          <\u002Fp>\n          <p>\n            The critical restriction is that online and offline policies share the\n            same object model: one node per block, one leaf-block eviction unit, and\n            the same candidate pool at each eviction event. The oracle evicts the\n            leaf block whose block-aligned prefix is reused farthest in the future.\n          <\u002Fp>\n          <div class=\"equation\"><span class=\"var\">victim<\u002Fspan> <span class=\"op\">=<\u002Fspan> argmax<sub>leaf<\u002Fsub> next_access(prefix)<\u002Fdiv>\n          <p>\n            In report terms, this is an upper bound under the same leaf-only\n            candidate constraint. It does not measure a broader optimum that could\n            restructure the tree or release non-leaf state early.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"svg-wrap\">\n          <svg viewBox=\"0 0 720 380\" role=\"img\" aria-label=\"Offline oracle leaf selection diagram\">\n            <rect x=\"0\" y=\"0\" width=\"720\" height=\"380\" rx=\"14\" fill=\"#ffffff\"><\u002Frect>\n            <text x=\"24\" y=\"32\" class=\"title\">At overflow: choose among current leaf blocks only<\u002Ftext>\n\n            <!-- Tree -->\n            <g>\n              <line x1=\"120\" y1=\"100\" x2=\"180\" y2=\"156\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"180\" y1=\"170\" x2=\"240\" y2=\"226\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"120\" y1=\"100\" x2=\"120\" y2=\"226\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <line x1=\"120\" y1=\"240\" x2=\"180\" y2=\"296\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n\n              <circle cx=\"120\" cy=\"92\" r=\"20\" fill=\"#ffffff\" stroke=\"#1a1a1a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"120\" y=\"97\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"600\">R<\u002Ftext>\n\n              <circle cx=\"180\" cy=\"164\" r=\"20\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"180\" y=\"169\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">p1<\u002Ftext>\n\n              <circle cx=\"240\" cy=\"234\" r=\"22\" fill=\"#a8462a\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"240\" y=\"239\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Geist Mono, monospace\" fill=\"#ffffff\">p2<\u002Ftext>\n              <text x=\"240\" y=\"276\" text-anchor=\"middle\" font-size=\"10\" fill=\"#6b6660\">leaf<\u002Ftext>\n\n              <circle cx=\"120\" cy=\"234\" r=\"20\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"120\" y=\"239\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">q0<\u002Ftext>\n\n              <circle cx=\"180\" cy=\"304\" r=\"22\" fill=\"#a8462a\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fcircle>\n              <text x=\"180\" y=\"309\" text-anchor=\"middle\" font-size=\"11\" font-family=\"Geist Mono, monospace\" fill=\"#ffffff\">q1<\u002Ftext>\n              <text x=\"180\" y=\"346\" text-anchor=\"middle\" font-size=\"10\" fill=\"#6b6660\">leaf<\u002Ftext>\n            <\u002Fg>\n\n            <!-- Candidate cards -->\n            <text x=\"320\" y=\"62\" class=\"label\">Candidate leaves &amp; next access<\u002Ftext>\n\n            <rect x=\"320\" y=\"80\" width=\"370\" height=\"58\" rx=\"10\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n            <text x=\"338\" y=\"106\" font-size=\"13\" font-weight=\"600\" fill=\"#853720\">leaf p2<\u002Ftext>\n            <text x=\"338\" y=\"124\" font-size=\"12\" fill=\"#2e2e2e\">next access in <tspan font-family=\"Geist Mono, monospace\" font-weight=\"600\">9<\u002Ftspan> steps<\u002Ftext>\n\n            <rect x=\"320\" y=\"148\" width=\"370\" height=\"58\" rx=\"10\" fill=\"#a8462a\"><\u002Frect>\n            <text x=\"338\" y=\"174\" font-size=\"13\" font-weight=\"600\" fill=\"#ffffff\">leaf q1<\u002Ftext>\n            <text x=\"338\" y=\"192\" font-size=\"12\" fill=\"#f6dccd\">next access in <tspan font-family=\"Geist Mono, monospace\" font-weight=\"600\">∞<\u002Ftspan> steps  ← farthest<\u002Ftext>\n\n            <rect x=\"320\" y=\"216\" width=\"370\" height=\"58\" rx=\"10\" fill=\"#fbf0ea\" stroke=\"#edbfa3\"><\u002Frect>\n            <text x=\"338\" y=\"242\" font-size=\"13\" font-weight=\"600\" fill=\"#853720\">leaf r1<\u002Ftext>\n            <text x=\"338\" y=\"260\" font-size=\"12\" fill=\"#2e2e2e\">next access in <tspan font-family=\"Geist Mono, monospace\" font-weight=\"600\">2<\u002Ftspan> steps<\u002Ftext>\n\n            <!-- Verdict -->\n            <rect x=\"320\" y=\"294\" width=\"370\" height=\"56\" rx=\"10\" fill=\"#ffffff\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Frect>\n            <text x=\"338\" y=\"318\" font-size=\"12\" font-weight=\"600\" fill=\"#a8462a\">ORACLE DECISION<\u002Ftext>\n            <text x=\"338\" y=\"338\" font-size=\"13\" fill=\"#1a1a1a\">Evict <tspan font-family=\"Geist Mono, monospace\" font-weight=\"600\">q1<\u002Ftspan> — its next-use distance is largest.<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- MECHANISM -->\n    <section class=\"section\" id=\"mechanism-analysis\">\n      <div class=\"section-head\">\n        <span class=\"num\">06 / Mechanism<\u002Fspan>\n        <h2>Shadow-oracle mechanism analysis<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            The mechanism analysis does not run two independent simulations and\n            compare their final trees. That would confound the result with divergent\n            state trajectories. Instead, it uses a shadow-oracle design.\n          <\u002Fp>\n          <p>\n            One online strategy drives the real simulation. At each eviction event,\n            the code inspects the exact same current leaf set and asks what\n            <code>tc_belady<\u002Fcode> would have evicted from that candidate pool.\n          <\u002Fp>\n          <div class=\"equation\">|<span class=\"var\">A<\u002Fspan>| <span class=\"op\">=<\u002Fspan> |<span class=\"var\">B<\u002Fspan>| <span class=\"op\">=<\u002Fspan> number of disagreement events<\u002Fdiv>\n          <p>\n            The invariant holds because each disagreement contributes exactly one\n            online-only victim and one oracle-only victim.\n          <\u002Fp>\n          <div class=\"legend\">\n            <div class=\"legend-item\"><span class=\"swatch\" style=\"background:#a8462a;\"><\u002Fspan><span><strong>A<\u002Fstrong> · online evicts, oracle retains<\u002Fspan><\u002Fdiv>\n            <div class=\"legend-item\"><span class=\"swatch\" style=\"background:#6e7d62;\"><\u002Fspan><span><strong>B<\u002Fstrong> · oracle evicts, online retains<\u002Fspan><\u002Fdiv>\n            <div class=\"legend-item\"><span class=\"swatch\" style=\"background:#d4cec3;\"><\u002Fspan><span><strong>C<\u002Fstrong> · both evict same leaf<\u002Fspan><\u002Fdiv>\n            <div class=\"legend-item\"><span class=\"swatch\" style=\"background:#fbf0ea; border:1px solid #d4cec3;\"><\u002Fspan><span><strong>D<\u002Fstrong> · both retain leaf<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"svg-wrap\">\n          <svg viewBox=\"0 0 720 420\" role=\"img\" aria-label=\"Shadow oracle group diagram\">\n            <rect x=\"0\" y=\"0\" width=\"720\" height=\"420\" rx=\"14\" fill=\"#ffffff\"><\u002Frect>\n            <text x=\"24\" y=\"32\" class=\"title\">Group labels at one shared eviction event<\u002Ftext>\n\n            <!-- A -->\n            <rect x=\"24\" y=\"56\" width=\"332\" height=\"160\" rx=\"14\" fill=\"#a8462a\"><\u002Frect>\n            <text x=\"46\" y=\"92\" font-size=\"34\" font-weight=\"800\" fill=\"#ffffff\">A<\u002Ftext>\n            <text x=\"100\" y=\"82\" font-size=\"13\" font-weight=\"600\" fill=\"#edbfa3\">online evicts<\u002Ftext>\n            <text x=\"100\" y=\"100\" font-size=\"13\" font-weight=\"600\" fill=\"#edbfa3\">oracle retains<\u002Ftext>\n            <line x1=\"46\" y1=\"118\" x2=\"334\" y2=\"118\" stroke=\"#6e7d62\" stroke-opacity=\"0.4\"><\u002Fline>\n            <text x=\"46\" y=\"142\" font-size=\"12\" fill=\"#f6dccd\">Typical interpretation:<\u002Ftext>\n            <text x=\"46\" y=\"162\" font-size=\"13\" fill=\"#ffffff\" font-weight=\"500\">useful block thrown away too early.<\u002Ftext>\n            <text x=\"46\" y=\"194\" font-size=\"11\" fill=\"#a8b59a\" font-family=\"Geist Mono, monospace\">↑ premature eviction<\u002Ftext>\n\n            <!-- B -->\n            <rect x=\"364\" y=\"56\" width=\"332\" height=\"160\" rx=\"14\" fill=\"#a8462a\"><\u002Frect>\n            <text x=\"386\" y=\"92\" font-size=\"34\" font-weight=\"800\" fill=\"#ffffff\">B<\u002Ftext>\n            <text x=\"440\" y=\"82\" font-size=\"13\" font-weight=\"600\" fill=\"#edbfa3\">oracle evicts<\u002Ftext>\n            <text x=\"440\" y=\"100\" font-size=\"13\" font-weight=\"600\" fill=\"#edbfa3\">online retains<\u002Ftext>\n            <line x1=\"386\" y1=\"118\" x2=\"674\" y2=\"118\" stroke=\"#6e7d62\" stroke-opacity=\"0.4\"><\u002Fline>\n            <text x=\"386\" y=\"142\" font-size=\"12\" fill=\"#f6dccd\">Typical interpretation:<\u002Ftext>\n            <text x=\"386\" y=\"162\" font-size=\"13\" fill=\"#ffffff\" font-weight=\"500\">dead block survives — looks warm.<\u002Ftext>\n            <text x=\"386\" y=\"194\" font-size=\"11\" fill=\"#a8b59a\" font-family=\"Geist Mono, monospace\">↑ false warmth<\u002Ftext>\n\n            <!-- C -->\n            <rect x=\"24\" y=\"234\" width=\"332\" height=\"160\" rx=\"14\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"46\" y=\"270\" font-size=\"34\" font-weight=\"800\" fill=\"#6b6660\">C<\u002Ftext>\n            <text x=\"100\" y=\"260\" font-size=\"13\" font-weight=\"600\" fill=\"#1a1a1a\">both evict same leaf<\u002Ftext>\n            <line x1=\"46\" y1=\"294\" x2=\"334\" y2=\"294\" stroke=\"#e6e1d8\"><\u002Fline>\n            <text x=\"46\" y=\"320\" font-size=\"12\" fill=\"#6b6660\">Agreement on the victim.<\u002Ftext>\n            <text x=\"46\" y=\"358\" font-size=\"11\" fill=\"#a8462a\" font-family=\"Geist Mono, monospace\">↑ aligned correctness<\u002Ftext>\n\n            <!-- D -->\n            <rect x=\"364\" y=\"234\" width=\"332\" height=\"160\" rx=\"14\" fill=\"#f4f1ec\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Frect>\n            <text x=\"386\" y=\"270\" font-size=\"34\" font-weight=\"800\" fill=\"#6b6660\">D<\u002Ftext>\n            <text x=\"440\" y=\"260\" font-size=\"13\" font-weight=\"600\" fill=\"#1a1a1a\">both retain leaf<\u002Ftext>\n            <line x1=\"386\" y1=\"294\" x2=\"674\" y2=\"294\" stroke=\"#e6e1d8\"><\u002Fline>\n            <text x=\"386\" y=\"320\" font-size=\"12\" fill=\"#6b6660\">Agreement on keeping the block.<\u002Ftext>\n            <text x=\"386\" y=\"358\" font-size=\"11\" fill=\"#a8462a\" font-family=\"Geist Mono, monospace\">↑ baseline retention<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"callout\" style=\"margin-top:18px;\">\n        <h3>Observed LRU failure mode<\u002Fh3>\n        <p>\n          At the LRU peak-gap point, many Group B leaves are both very recent and\n          never reused again. In the current report summary, Group B for LRU has\n          median <code>time_since_last_access = 0<\u002Fcode>,\n          <code>time_to_next_access = ∞<\u002Fcode>, and\n          <code>tree_depth = 1077<\u002Fcode>. That is the signature of false warmth:\n          deep conversation-tail blocks that were just touched but are already dead.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- DEPTHLRU -->\n    <section class=\"section\" id=\"heuristic-motivation\">\n      <div class=\"section-head\">\n        <span class=\"num\">07 / Heuristic<\u002Fspan>\n        <h2>Why DepthLRU exists<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            Plain LRU knows only recency. It does not distinguish between a recently\n            touched broadly shared prefix and a recently touched deep tail block\n            near the end of a conversation. In this workload, that distinction\n            matters.\n          <\u002Fp>\n          <p>\n            A deep block can look extremely warm because it was touched by the\n            latest human turn, yet still be dead immediately afterward. Meanwhile, a\n            shallower prefix can look slightly older while remaining reusable across\n            later accesses.\n          <\u002Fp>\n          <div class=\"equation\">priority <span class=\"op\">=<\u002Fspan> last_access_index <span class=\"op\">−<\u002Fspan> α · depth<\u002Fdiv>\n          <p style=\"margin-top:12px;\">\n            <strong>Current design:<\u002Fstrong>\n            <code>α = 0.01 · page_size<\u002Fcode>. The reported\n            <code>page_size = 1<\u002Fcode> benchmark therefore uses\n            <code>α = 0.01<\u002Fcode>.\n          <\u002Fp>\n          <div class=\"callout\" style=\"margin-top:14px;\">\n            <h3>Interpretation<\u002Fh3>\n            <p>\n              <code>depth_lru<\u002Fcode> is a structural correction to recency, not a\n              new semantic signal. Under this trace construction it may also be\n              acting as a proxy for \"chat tail position,\" which is why the\n              implementation scales the depth penalty with <code>page_size<\u002Fcode>\n              and why robustness beyond <code>page_size = 1<\u002Fcode> still matters.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"svg-wrap\">\n          <svg viewBox=\"0 0 720 440\" role=\"img\" aria-label=\"DepthLRU motivation diagram\">\n            <rect x=\"0\" y=\"0\" width=\"720\" height=\"440\" rx=\"14\" fill=\"#ffffff\"><\u002Frect>\n            <text x=\"24\" y=\"32\" class=\"title\">False warmth: deep recent leaf vs. shallower reusable prefix<\u002Ftext>\n\n            <!-- Left card: deep tail -->\n            <rect x=\"24\" y=\"56\" width=\"332\" height=\"362\" rx=\"14\" fill=\"#f4f1ec\" stroke=\"#d4cec3\"><\u002Frect>\n            <text x=\"44\" y=\"86\" font-size=\"14\" font-weight=\"700\" fill=\"#1a1a1a\">Deep tail block<\u002Ftext>\n            <text x=\"44\" y=\"106\" font-size=\"11\" font-family=\"Geist Mono, monospace\" fill=\"#6b6660\">eviction-worthy<\u002Ftext>\n\n            <g font-family=\"Geist, sans-serif\" font-size=\"12\">\n              <text x=\"44\" y=\"146\" fill=\"#6b6660\">last_access<\u002Ftext>\n              <text x=\"336\" y=\"146\" text-anchor=\"end\" fill=\"#1a1a1a\" font-weight=\"600\">very recent<\u002Ftext>\n              <line x1=\"44\" y1=\"156\" x2=\"336\" y2=\"156\" stroke=\"#e6e1d8\"><\u002Fline>\n\n              <text x=\"44\" y=\"180\" fill=\"#6b6660\">depth<\u002Ftext>\n              <text x=\"336\" y=\"180\" text-anchor=\"end\" fill=\"#1a1a1a\" font-weight=\"600\">very large<\u002Ftext>\n              <line x1=\"44\" y1=\"190\" x2=\"336\" y2=\"190\" stroke=\"#e6e1d8\"><\u002Fline>\n\n              <text x=\"44\" y=\"214\" fill=\"#6b6660\">future reuse<\u002Ftext>\n              <text x=\"336\" y=\"214\" text-anchor=\"end\" fill=\"#1a1a1a\" font-weight=\"600\">none<\u002Ftext>\n            <\u002Fg>\n\n            <!-- visual: long chain -->\n            <g transform=\"translate(44,250)\">\n              <line x1=\"0\" y1=\"14\" x2=\"280\" y2=\"14\" stroke=\"#d4cec3\" stroke-width=\"2\"><\u002Fline>\n              <circle cx=\"20\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"60\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"140\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"180\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"220\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#d4cec3\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"260\" cy=\"14\" r=\"11\" fill=\"#1a1a1a\" stroke=\"#1a1a1a\"><\u002Fcircle>\n              <text x=\"260\" y=\"46\" text-anchor=\"middle\" font-size=\"10\" fill=\"#1a1a1a\" font-weight=\"600\">recent leaf<\u002Ftext>\n            <\u002Fg>\n\n            <text x=\"44\" y=\"338\" font-size=\"12\" fill=\"#6b6660\">LRU sees recency and protects it.<\u002Ftext>\n            <text x=\"44\" y=\"358\" font-size=\"12\" fill=\"#a8462a\" font-weight=\"600\">DepthLRU subtracts α · depth.<\u002Ftext>\n\n            <!-- Right card: shallow shared -->\n            <rect x=\"364\" y=\"56\" width=\"332\" height=\"362\" rx=\"14\" fill=\"#f6dccd\" stroke=\"#a8462a\" stroke-width=\"1\"><\u002Frect>\n            <text x=\"384\" y=\"86\" font-size=\"14\" font-weight=\"700\" fill=\"#1a1a1a\">Shared shallower prefix<\u002Ftext>\n            <text x=\"384\" y=\"106\" font-size=\"11\" font-family=\"Geist Mono, monospace\" fill=\"#853720\">retain-worthy<\u002Ftext>\n\n            <g font-family=\"Geist, sans-serif\" font-size=\"12\">\n              <text x=\"384\" y=\"146\" fill=\"#2e2e2e\">last_access<\u002Ftext>\n              <text x=\"676\" y=\"146\" text-anchor=\"end\" fill=\"#1a1a1a\" font-weight=\"600\">slightly older<\u002Ftext>\n              <line x1=\"384\" y1=\"156\" x2=\"676\" y2=\"156\" stroke=\"#edbfa3\"><\u002Fline>\n\n              <text x=\"384\" y=\"180\" fill=\"#2e2e2e\">depth<\u002Ftext>\n              <text x=\"676\" y=\"180\" text-anchor=\"end\" fill=\"#1a1a1a\" font-weight=\"600\">moderate<\u002Ftext>\n              <line x1=\"384\" y1=\"190\" x2=\"676\" y2=\"190\" stroke=\"#edbfa3\"><\u002Fline>\n\n              <text x=\"384\" y=\"214\" fill=\"#2e2e2e\">future reuse<\u002Ftext>\n              <text x=\"676\" y=\"214\" text-anchor=\"end\" fill=\"#1a1a1a\" font-weight=\"600\">likely<\u002Ftext>\n            <\u002Fg>\n\n            <!-- visual: short chain -->\n            <g transform=\"translate(384,250)\">\n              <line x1=\"0\" y1=\"14\" x2=\"160\" y2=\"14\" stroke=\"#a8462a\" stroke-width=\"2\"><\u002Fline>\n              <circle cx=\"20\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#a8462a\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"60\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#a8462a\" stroke-width=\"1.5\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"14\" r=\"11\" fill=\"#a8462a\" stroke=\"#a8462a\"><\u002Fcircle>\n              <circle cx=\"140\" cy=\"14\" r=\"10\" fill=\"#ffffff\" stroke=\"#a8462a\" stroke-width=\"1.5\"><\u002Fcircle>\n              <text x=\"100\" y=\"46\" text-anchor=\"middle\" font-size=\"10\" fill=\"#853720\" font-weight=\"600\">shared node<\u002Ftext>\n            <\u002Fg>\n\n            <text x=\"384\" y=\"338\" font-size=\"12\" fill=\"#2e2e2e\">LRU may evict it for looking older.<\u002Ftext>\n            <text x=\"384\" y=\"358\" font-size=\"12\" fill=\"#a8462a\" font-weight=\"600\">DepthLRU keeps it competitive.<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RESULTS -->\n    <section class=\"section\" id=\"results\">\n      <div class=\"section-head\">\n        <span class=\"num\">08 / Results<\u002Fspan>\n        <h2>Current benchmark results<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <p>\n            Fixed-block model with <code>page_size = 1<\u002Fcode>, the alternate Llama\n            tokenizer, interleaved ordering, and six log-spaced block budgets:\n            <code>319 · 1271 · 5061 · 20160 · 80302 · 319862<\u002Fcode>.\n          <\u002Fp>\n          <div class=\"table-wrap\">\n            <table class=\"benchmark-table\">\n              <thead>\n                <tr>\n                  <th>strategy<\u002Fth>\n                  <th>319<\u002Fth>\n                  <th>1271<\u002Fth>\n                  <th>5061<\u002Fth>\n                  <th>20160<\u002Fth>\n                  <th>80302<\u002Fth>\n                  <th>319862<\u002Fth>\n                <\u002Ftr>\n              <\u002Fthead>\n              <tbody>\n                <tr class=\"row-highlight\"><td><code>tc_belady<\u002Fcode><\u002Ftd><td>0.0300<\u002Ftd><td>0.0969<\u002Ftd><td>0.2240<\u002Ftd><td>0.4339<\u002Ftd><td>0.6056<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>lru<\u002Fcode><\u002Ftd><td>0.0072<\u002Ftd><td>0.0192<\u002Ftd><td>0.0627<\u002Ftd><td>0.1850<\u002Ftd><td>0.4543<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>lfu<\u002Fcode><\u002Ftd><td>0.0049<\u002Ftd><td>0.0087<\u002Ftd><td>0.0175<\u002Ftd><td>0.0708<\u002Ftd><td>0.2604<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>fifo<\u002Fcode><\u002Ftd><td>0.0072<\u002Ftd><td>0.0192<\u002Ftd><td>0.0627<\u002Ftd><td>0.1850<\u002Ftd><td>0.4543<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>slru<\u002Fcode><\u002Ftd><td>0.0049<\u002Ftd><td>0.0087<\u002Ftd><td>0.0175<\u002Ftd><td>0.0708<\u002Ftd><td>0.2604<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>priority<\u002Fcode><\u002Ftd><td>0.0072<\u002Ftd><td>0.0192<\u002Ftd><td>0.0627<\u002Ftd><td>0.1850<\u002Ftd><td>0.4543<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr class=\"row-highlight\"><td><code>depth_lru<\u002Fcode><\u002Ftd><td>0.0075<\u002Ftd><td>0.0201<\u002Ftd><td>0.0641<\u002Ftd><td>0.1860<\u002Ftd><td>0.4565<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>random<\u002Fcode><\u002Ftd><td>0.0065<\u002Ftd><td>0.0175<\u002Ftd><td>0.0533<\u002Ftd><td>0.1472<\u002Ftd><td>0.3680<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>mru<\u002Fcode><\u002Ftd><td>0.0024<\u002Ftd><td>0.0056<\u002Ftd><td>0.0118<\u002Ftd><td>0.0393<\u002Ftd><td>0.1476<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n                <tr><td><code>filo<\u002Fcode><\u002Ftd><td>0.0024<\u002Ftd><td>0.0056<\u002Ftd><td>0.0118<\u002Ftd><td>0.0393<\u002Ftd><td>0.1476<\u002Ftd><td>0.6056<\u002Ftd><\u002Ftr>\n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"callout\">\n            <h3>Gap summary<\u002Fh3>\n            <div class=\"table-wrap\" style=\"margin-top: 8px; background: rgba(255,255,255,0.6);\">\n              <table>\n                <thead>\n                  <tr><th>baseline<\u002Fth><th class=\"numeric\">peak gap<\u002Fth><th class=\"numeric\">cache size<\u002Fth><\u002Ftr>\n                <\u002Fthead>\n                <tbody>\n                  <tr><td><code>lru<\u002Fcode><\u002Ftd><td class=\"numeric\">80.2%<\u002Ftd><td class=\"numeric\">1271<\u002Ftd><\u002Ftr>\n                  <tr><td><code>depth_lru<\u002Fcode><\u002Ftd><td class=\"numeric\">79.3%<\u002Ftd><td class=\"numeric\">1271<\u002Ftd><\u002Ftr>\n                  <tr><td><code>random<\u002Fcode><\u002Ftd><td class=\"numeric\">82.0%<\u002Ftd><td class=\"numeric\">1271<\u002Ftd><\u002Ftr>\n                  <tr><td><code>lfu<\u002Fcode><\u002Ftd><td class=\"numeric\">92.2%<\u002Ftd><td class=\"numeric\">5061<\u002Ftd><\u002Ftr>\n                  <tr><td><code>mru<\u002Fcode><\u002Ftd><td class=\"numeric\">94.7%<\u002Ftd><td class=\"numeric\">5061<\u002Ftd><\u002Ftr>\n                <\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"callout dark\" style=\"margin-top:16px;\">\n            <h3>Main read<\u002Fh3>\n            <p>\n              Peak relative gap is not the whole story. At the more interpretable\n              <code>20160<\u002Fcode>-token budget, the constrained absolute gap is\n              <strong>0.2488<\u002Fstrong> token-hit-rate points for\n              <code>page_size = 1<\u002Fcode>. The heuristic helps, but only slightly:\n              <code>depth_lru<\u002Fcode> improves over <code>lru<\u002Fcode> at every\n              non-full cache size — yet the gain remains small.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"mini-panel\" style=\"margin-top:16px;\">\n            <strong>Runtime.<\u002Fstrong>\n            Six-size sweep:\n            <code>353.70s real<\u002Fcode> ·\n            <code>331.60s user<\u002Fcode> ·\n            <code>13.15s sys<\u002Fcode>.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"callout\" style=\"margin-top:22px;\">\n        <h3>page_size robustness check<\u002Fh3>\n        <p>\n          Same trace rerun at <code>page_size = 16, 32, 64<\u002Fcode> using equal token\n          budgets and the policy set <code>lru / depth_lru / tc_belady<\u002Fcode>.\n          Result: the constrained LRU-vs-oracle gap remains large.\n        <\u002Fp>\n        <div class=\"table-wrap\" style=\"margin-top:10px;\">\n          <table>\n            <thead>\n              <tr>\n                <th>page_size<\u002Fth>\n                <th class=\"numeric\">block budget @ 20160 tokens<\u002Fth>\n                <th class=\"numeric\">tc_belady<\u002Fth>\n                <th class=\"numeric\">lru<\u002Fth>\n                <th class=\"numeric\">absolute gap<\u002Fth>\n                <th class=\"numeric\">depth gain<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr><td><code>1<\u002Fcode><\u002Ftd><td class=\"numeric\">20160<\u002Ftd><td class=\"numeric\">0.4339<\u002Ftd><td class=\"numeric\">0.1850<\u002Ftd><td class=\"numeric\">0.2488<\u002Ftd><td class=\"numeric\">0.0010<\u002Ftd><\u002Ftr>\n              <tr><td><code>16<\u002Fcode><\u002Ftd><td class=\"numeric\">1260<\u002Ftd><td class=\"numeric\">0.4286<\u002Ftd><td class=\"numeric\">0.1779<\u002Ftd><td class=\"numeric\">0.2507<\u002Ftd><td class=\"numeric\">0.0020<\u002Ftd><\u002Ftr>\n              <tr><td><code>32<\u002Fcode><\u002Ftd><td class=\"numeric\">630<\u002Ftd><td class=\"numeric\">0.4257<\u002Ftd><td class=\"numeric\">0.1745<\u002Ftd><td class=\"numeric\">0.2512<\u002Ftd><td class=\"numeric\">0.0026<\u002Ftd><\u002Ftr>\n              <tr><td><code>64<\u002Fcode><\u002Ftd><td class=\"numeric\">315<\u002Ftd><td class=\"numeric\">0.4206<\u002Ftd><td class=\"numeric\">0.1689<\u002Ftd><td class=\"numeric\">0.2516<\u002Ftd><td class=\"numeric\">0.0024<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"margin-top:14px;\">\n          The absolute LRU-vs-oracle gap at a 20160-token budget stays near 0.25\n          across page sizes 1, 16, 32, and 64. Scaling the depth penalty by\n          <code>page_size<\u002Fcode> recovers some effect beyond the diagnostic\n          baseline — but it still does not materially close the constrained gap.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FIDELITY -->\n    <section class=\"section\" id=\"fidelity\">\n      <div class=\"section-head\">\n        <span class=\"num\">09 / Fidelity<\u002Fspan>\n        <h2>Alignment &amp; intentional simplifications<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"section-grid\">\n        <div>\n          <div class=\"callout\">\n            <h3>Aligned pieces<\u002Fh3>\n            <ul style=\"margin: 8px 0 0; padding-left: 18px; color: var(--ink-2);\">\n              <li>page-aligned block semantics<\u002Fli>\n              <li>radix-tree prefix matching at block boundaries<\u002Fli>\n              <li>leaf-based candidate pool for eviction<\u002Fli>\n              <li>priority-aware eviction rule shape<\u002Fli>\n              <li>per-node recency &amp; frequency metadata<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"callout dark\">\n            <h3>Explicit simplifications<\u002Fh3>\n            <ul style=\"margin: 8px 0 0; padding-left: 18px;\">\n              <li>fixed-size block model (not full allocator)<\u002Fli>\n              <li>no lock-state modeling<\u002Fli>\n              <li>no extra-key namespaces<\u002Fli>\n              <li>no Eagle / bigram mode<\u002Fli>\n              <li>report benchmark uses <code>page_size = 1<\u002Fcode><\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"footer-note\" style=\"margin-top:20px;\">\n        A precise explanation of the current repository state — not a claim that\n        every production SGLang detail has been simulated.\n      <\u002Fp>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
